<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Manager</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://kit.fontawesome.com/7db96a5cb9.js" crossorigin="anonymous"></script>
    <script src="index.js" defer></script>
</head>
<body>
    <section id="Landing-page">
        <nav>
          <figure>
            <i class="fa-brands fa-spotify spotify-logo"></i>
          </figure>
          <ul class="nav-links-list">
            <li class="nav-link">
              <a
                href="#"
                class="nav-link-anchor link-hover-effect link-hover-effect-black link-hover-effect--white no-cursor"
                >Home</a
              >
            </li>
            <li class="nav-link">
              <a
                href="./song.html"
                class="nav-link-anchor link-hover-effect link-hover-effect-black link-hover-effect--white "
                >Find your Song</a
              >
            </li>
            <li class="nav-link">
              <a
                href="#"
                class="nav-link-anchor link-hover-effect link-hover-effect-black link-hover-effect--white no-cursor"
                >Log in</a
              >
            </li>
            <button class="menu-dropdown"><i class="fa-solid fa-caret-down"></i></button>
            <li class="nav-link click" onclick="toggleContrast()">
              <a href="#" class="nav-link-anchor"
                ><i class="fa-solid fa-circle-half-stroke fa-spin"></i
              ></a>
            </li>
          </ul>
        </nav>
        <div class="search-container">
            <div class="search-row">
                <h1 class="search-title">Find the music that you like the most</h1>
                <h3 class="search-subtitle">Let's decide what type of music for you of the day</h3>
                <div class="input-box">
                    <input type="text" required placeholder="Search by Song name, artist, album or release year" />
                    <div class="btn-search">
                        <button class="btn" id="searchButton"><span class="gray">Search</span></button>
                    </div>
                </div>
                <div class="img-wrapper">
                    <img class="search-img" src="./assets/wp8733088.png" alt="" />
                </div>
            </div>
        </div> 
        <div class="cursor">
              <div class="circle"></div>
              <div class="circle"></div>
              <div class="circle"></div>
              <div class="circle"></div>
              <div class="circle"></div>
              <div class="circle"></div>
              <div class="circle"></div>
              <div class="circle"></div>
              <div class="circle"></div>
              <div class="circle"></div>
              <div class="circle"></div>
              <div class="circle"></div>
              <div class="circle"></div>
              <div class="circle"></div>
              <div class="circle"></div>
              <div class="circle"></div>
              <div class="circle"></div>
              <div class="circle"></div>
              <div class="circle"></div>
              <div class="circle"></div>
        </div>      
    </section>         
</body>
</html>
